<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Physical CRT Simulator</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0f0; font-family: monospace; }
        #crt-canvas { width: 100vw; height: 100vh; display: block; cursor: crosshair; }
        .tp-dfwv { z-index: 100 !important; }
    </style>
</head>
<body>
    <canvas id="crt-canvas"></canvas>
    <canvas id="source-buffer" width="1024" height="1024" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.0/dist/tweakpane.min.js"></script>
    <script src="PhysicalCRT.js"></script>
    <script>
        window.addEventListener('load', () => {
            const sourceCanvas = document.getElementById('source-buffer');
            const ctx = sourceCanvas.getContext('2d');
            const outputCanvas = document.getElementById('crt-canvas');
            const dpr = window.devicePixelRatio || 1;
            outputCanvas.width = window.innerWidth * dpr;
            outputCanvas.height = window.innerHeight * dpr;

            const crt = new PhysicalCRT(sourceCanvas, outputCanvas);
            const pane = new Tweakpane.Pane();
            pane.addInput(crt.settings, 'maskStren', { min: 0, max: 1 });
            pane.addInput(crt.settings, 'maskBlur', { min: 0, max: 1, label: 'Beam Focus' });
            pane.addInput(crt.settings, 'convergence', { min: 0, max: 5 });
            pane.addInput(crt.settings, 'scanline', { min: 0, max: 1 });

            let isPanning = false;
            let lastMouse = { x: 0, y: 0 };

            window.addEventListener('mousedown', e => { 
                if (e.target.closest('.tp-dfwv')) return;
                isPanning = true; 
                lastMouse = { x: e.clientX, y: e.clientY }; 
            });

            window.addEventListener('mouseup', () => isPanning = false);

            window.addEventListener('mousemove', e => {
                if (!isPanning) return;
                const z = crt.settings.zoom;
                
                // Horizontal: Subtract to move against drag
                crt.settings.pan.x -= (e.clientX - lastMouse.x) / (outputCanvas.clientWidth * z);
                
                // Vertical: Add to move with drag (correcting for WebGL Y-up vs Screen Y-down)
                crt.settings.pan.y += (e.clientY - lastMouse.y) / (outputCanvas.clientHeight * z); 
                
                lastMouse = { x: e.clientX, y: e.clientY };
            });

            window.addEventListener('wheel', e => {
                if (e.target.closest('.tp-dfwv')) return;
                e.preventDefault();
                crt.settings.zoom = Math.max(0.5, Math.min(40, crt.settings.zoom - e.deltaY * 0.005));
            }, { passive: false });

            window.addEventListener('keydown', e => {
                if (e.key === ' ') { crt.settings.pan = {x:0, y:0}; crt.settings.zoom = 1; }
            });

            function loop() {
                ctx.fillStyle = '#050505'; ctx.fillRect(0,0,1024,1024);
                ctx.strokeStyle = '#fff'; ctx.lineWidth = 140;
                ctx.beginPath(); ctx.arc(512,512,300,0,Math.PI*2); ctx.stroke();
                ['#f00','#0f0','#00f','#fff'].forEach((c,i) => {
                    ctx.fillStyle = c; ctx.fillRect(252+i*130, 680, 100, 120);
                });
                crt.render();
                requestAnimationFrame(loop);
            }
            loop();
        });
    </script>
</body>
</html>
