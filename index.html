<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Virtual Cathode</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        #crt-canvas { width: 100vw; height: 100vh; cursor: crosshair; }
    </style>
</head>
<body>

    <canvas id="crt-canvas"></canvas>
    <canvas id="source-buffer" width="1024" height="1024" style="display:none;"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.0/dist/tweakpane.min.js"></script>
    <script src="VirtualCathode.js"></script>

    <script>
        const sourceCanvas = document.getElementById('source-buffer');
        const ctx = sourceCanvas.getContext('2d');
        const outputCanvas = document.getElementById('crt-canvas');
        outputCanvas.width = window.innerWidth;
        outputCanvas.height = window.innerHeight;

        const monitor = new VirtualCathode(sourceCanvas, outputCanvas);

        // === INTERACTION: scroll=zoom, right-drag=pan ===
        let isPanning = false;
        let lastMouse = { x: 0, y: 0 };

        outputCanvas.addEventListener('mousedown', e => {
            if (e.button === 2) {
                isPanning = true;
                lastMouse = { x: e.clientX, y: e.clientY };
            }
        });
        outputCanvas.addEventListener('contextmenu', e => e.preventDefault());
        window.addEventListener('mouseup', () => isPanning = false);
        window.addEventListener('mousemove', e => {
            if (!isPanning) return;
            const dx = (e.clientX - lastMouse.x) / outputCanvas.width;
            const dy = (e.clientY - lastMouse.y) / outputCanvas.height;
            monitor.settings.pan.x += dx;
            monitor.settings.pan.y -= dy;
            lastMouse = { x: e.clientX, y: e.clientY };
        });

        window.addEventListener('wheel', e => {
            const factor = e.deltaY > 0 ? 0.92 : 1.08;
            monitor.settings.zoom = Math.max(1.0, Math.min(400.0,
                monitor.settings.zoom * factor));
        }, { passive: true });

        // === TWEAKPANE ===
        const pane = new Tweakpane.Pane({ title: 'Virtual Cathode' });
        const s = monitor.settings;
        pane.addInput(s, 'zoom',        { min: 1, max: 400 });
        pane.addInput(s, 'maskScale',   { min: 100, max: 2000, step: 1, label: 'Mask Scale' });
        pane.addInput(s, 'dotSoftness', { min: 0.01, max: 0.20, label: 'Dot Softness' });
        pane.addInput(s, 'persistence', { min: 0, max: 0.98 });
        pane.addInput(s, 'clipExponent',{ min: 0.5, max: 10, label: 'Clip Exp' });
        pane.addInput(s, 'curvature',   { min: 0, max: 0.1 });

        const fBloom = pane.addFolder({ title: 'Bloom' });
        fBloom.addInput(s, 'bloomCore', { min: 0, max: 4, label: 'Core' });
        fBloom.addInput(s, 'bloomMid',  { min: 0, max: 4, label: 'Mid' });
        fBloom.addInput(s, 'bloomHalo', { min: 0, max: 4, label: 'Halo' });

        // === STATIC TEST CARD ===
        // Drawn once — no animation needed for verifying phosphor behavior.
        // Re-drawn on each frame so persistence can be tested by toggling content.

        function drawTestCard() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 1024, 1024);

            // --- Title ---
            ctx.font = 'bold 48px monospace';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#fff';
            ctx.fillText('VIRTUAL CATHODE', 512, 64);

            ctx.font = '18px monospace';
            ctx.fillStyle = '#888';
            ctx.fillText('PHOSPHOR EMULATION TEST CARD', 512, 94);

            // --- SMPTE-style color bars ---
            const colors = ['#fff','#ff0','#0ff','#0f0','#f0f','#f00','#00f'];
            const barW = Math.floor(904 / colors.length);
            colors.forEach((c, i) => {
                ctx.fillStyle = c;
                ctx.fillRect(60 + i * barW, 130, barW, 100);
            });

            // --- Grayscale ramp ---
            for (let x = 0; x < 904; x++) {
                const v = Math.floor((x / 904) * 255);
                ctx.fillStyle = `rgb(${v},${v},${v})`;
                ctx.fillRect(60 + x, 260, 1, 40);
            }
            ctx.font = '12px monospace';
            ctx.textAlign = 'left';
            ctx.fillStyle = '#666';
            ctx.fillText('0', 60, 315);
            ctx.textAlign = 'right';
            ctx.fillText('255', 964, 315);

            // --- Colored rectangles ---
            const rects = [
                { x: 60,  c: '#f00', label: 'R' },
                { x: 230, c: '#0f0', label: 'G' },
                { x: 400, c: '#00f', label: 'B' },
                { x: 570, c: '#ff0', label: 'Y' },
                { x: 740, c: '#f0f', label: 'M' },
            ];
            rects.forEach(r => {
                ctx.fillStyle = r.c;
                ctx.fillRect(r.x, 340, 150, 100);
                ctx.font = 'bold 36px monospace';
                ctx.textAlign = 'center';
                ctx.fillStyle = '#000';
                ctx.fillText(r.label, r.x + 75, 400);
            });

            // --- Fine detail text (for resolution testing) ---
            ctx.textAlign = 'left';
            const sizes = [24, 18, 14, 12, 10, 8];
            let ty = 490;
            sizes.forEach(sz => {
                ctx.font = `${sz}px monospace`;
                ctx.fillStyle = '#0f0';
                ctx.fillText(`${sz}px: The quick brown fox jumps over the lazy dog`, 60, ty);
                ty += sz + 6;
            });

            // --- Convergence crosshatch ---
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1;
            for (let x = 60; x <= 964; x += 50) {
                ctx.beginPath();
                ctx.moveTo(x, 680);
                ctx.lineTo(x, 880);
                ctx.stroke();
            }
            for (let y = 680; y <= 880; y += 50) {
                ctx.beginPath();
                ctx.moveTo(60, y);
                ctx.lineTo(964, y);
                ctx.stroke();
            }

            // --- Bright/dark contrast blocks ---
            ctx.fillStyle = '#fff';
            ctx.fillRect(60, 910, 200, 80);
            ctx.fillStyle = '#000';
            ctx.font = 'bold 24px monospace';
            ctx.textAlign = 'center';
            ctx.fillText('WHITE', 160, 958);

            ctx.fillStyle = '#111';
            ctx.fillRect(280, 910, 200, 80);
            ctx.fillStyle = '#888';
            ctx.fillText('DARK', 380, 958);

            ctx.fillStyle = '#0f0';
            ctx.fillRect(500, 910, 200, 80);
            ctx.fillStyle = '#000';
            ctx.fillText('GREEN', 600, 958);

            ctx.fillStyle = '#f00';
            ctx.fillRect(720, 910, 200, 80);
            ctx.fillStyle = '#fff';
            ctx.fillText('RED', 820, 958);
        }

        // Draw once
        drawTestCard();

        // === RENDER LOOP ===
        function animate(t) {
            monitor.render(t);
            requestAnimationFrame(animate);
        }
        requestAnimationFrame(animate);

        window.addEventListener('resize', () => {
            outputCanvas.width = window.innerWidth;
            outputCanvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
